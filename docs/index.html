<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACE MISSION: ULTRA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --primary: #1e90ff;
            --danger: #ff3366;
            --warning: #ffcc00;
            --bg: #050505;
        }

        body {
            margin: 0;
            background: var(--bg);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(30, 144, 255, 0.1);
            border: 2px solid #222;
            background: #000;
        }

        canvas { display: block; }

        /* --- SISTEMA DE MENÚS --- */
        .ui-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            text-align: center;
        }

        .ui-screen.active { display: flex; }

        .menu-card {
            padding: 30px;
            border: 1px solid var(--primary);
            background: rgba(10, 10, 10, 0.95);
            border-radius: 10px;
            min-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(30, 144, 255, 0.5);
            margin-bottom: 30px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }

        button {
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--primary);
        }

        /* --- FORMULARIOS DE OPCIONES --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .option-item label { display: block; margin-bottom: 5px; color: #aaa; }
        select, input {
            width: 100%;
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 5px;
            font-family: inherit;
        }

        /* --- HUD --- */
        #hud {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            padding: 15px 25px;
            display: none;
            justify-content: space-between;
            pointer-events: none;
            font-size: 1rem;
        }

        #boss-ui {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            display: none;
        }

        .hp-bar-bg { width: 100%; height: 10px; background: #333; border: 1px solid #555; }
        #boss-hp-fill { width: 100%; height: 100%; background: var(--danger); transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div id="score">SCORE: 000000</div>
            <div id="level-tag">MODO: --</div>
            <div id="lives">❤️❤️❤️</div>
        </div>

        <div id="boss-ui">
            <div style="font-size: 0.7rem; color: var(--danger); margin-bottom: 5px;">ADVERTENCIA: ENTIDAD HOSTIL</div>
            <div class="hp-bar-bg"><div id="boss-hp-fill"></div></div>
        </div>

        <div id="menu-main" class="ui-screen active">
            <div class="menu-card">
                <h1 id="main-title">SPACE MISSION</h1>
                <div class="btn-group">
                    <button onclick="showScreen('menu-play')">Jugar</button>
                    <button onclick="showScreen('menu-controls')">Controles</button>
                    <button onclick="showScreen('menu-options')">Opciones</button>
                </div>
            </div>
        </div>

        <div id="menu-play" class="ui-screen">
            <div class="menu-card">
                <h1>SELECCIONAR MODO</h1>
                <div class="btn-group">
                    <button onclick="startMission('progressive')">Juego Progressive</button>
                    <button onclick="startMission('custom')">Juego Personalizado</button>
                    <button onclick="showScreen('menu-main')" style="border-color: #666; color: #666;">Volver</button>
                </div>
            </div>
        </div>

        <div id="menu-controls" class="ui-screen">
            <div class="menu-card">
                <h1>SISTEMA DE CONTROL</h1>
                <div style="text-align: left; color: #ccc; line-height: 2; margin-bottom: 20px;">
                    <p>• <b>WASD / FLECHAS:</b> Motores de posicionamiento</p>
                    <p>• <b>CLIC IZQ:</b> Cañón de ráfaga continua</p>
                    <p>• <b>CLIC DER:</b> Disparo triple de plasma</p>
                </div>
                <button onclick="showScreen('menu-main')">Entendido</button>
            </div>
        </div>

        <div id="menu-options" class="ui-screen">
            <div class="menu-card">
                <h1>CONFIGURACIÓN</h1>
                <div class="options-grid">
                    <div class="option-item">
                        <label>Dificultad Base</label>
                        <select id="opt-difficulty">
                            <option value="1">Fácil</option>
                            <option value="2" selected>Normal</option>
                            <option value="3">Difícil</option>
                            <option value="5">Muy Difícil</option>
                        </select>
                    </div>
                    <div class="option-item">
                        <label>Vidas Iniciales</label>
                        <input type="number" id="opt-lives" value="3" min="1" max="10">
                    </div>
                    <div class="option-item">
                        <label>Ayudas (Power-ups)</label>
                        <select id="opt-helpers">
                            <option value="0">Desactivadas</option>
                            <option value="1" selected>Estándar</option>
                            <option value="2">Máximas</option>
                        </select>
                    </div>
                    <div class="option-item">
                        <label>Densidad Enemigos</label>
                        <input type="range" id="opt-density" min="1" max="10" value="5">
                    </div>
                </div>
                <button onclick="saveOptions()">Guardar Cambios</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 900;
    canvas.height = 600;

    // --- CONFIGURACIÓN Y ESTADO ---
    let gameState = 'MENU'; 
    let gameMode = 'progressive'; // progressive o custom
    let customSettings = { difficulty: 2, lives: 3, helpers: 1, density: 5 };
    let progressiveLevel = 1;

    let score = 0;
    let lives = 3;
    let screenShake = 0;
    let frameCount = 0;

    // Objetos
    const nave = { x: 450, y: 300, vx: 0, vy: 0, accel: 0.7, fric: 0.93, inmune: false };
    let bullets = [], enemies = [], enemyBullets = [], particles = [], stars = [], boss = null;
    let keys = {};
    let mouse = { x: 0, y: 0, down: false };

    // --- MANEJO DE PANTALLAS ---
    function showScreen(screenId) {
        document.querySelectorAll('.ui-screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function saveOptions() {
        customSettings.difficulty = parseInt(document.getElementById('opt-difficulty').value);
        customSettings.lives = parseInt(document.getElementById('opt-lives').value);
        customSettings.helpers = parseInt(document.getElementById('opt-helpers').value);
        customSettings.density = parseInt(document.getElementById('opt-density').value);
        showScreen('menu-main');
    }

    // --- LÓGICA DE INICIO ---
    function startMission(mode) {
        gameMode = mode;
        gameState = 'PLAYING';
        score = 0;
        progressiveLevel = 1;
        lives = (mode === 'custom') ? customSettings.lives : 3;
        
        // Reset objetos
        bullets = []; enemies = []; enemyBullets = []; particles = []; boss = null;
        nave.x = canvas.width/2; nave.y = canvas.height/2;

        document.querySelectorAll('.ui-screen').forEach(s => s.classList.remove('active'));
        document.getElementById('hud').style.display = 'flex';
        document.getElementById('boss-ui').style.display = 'none';
        document.getElementById('level-tag').innerText = `MODO: ${mode.toUpperCase()}`;
        updateHUD();
    }

    // --- SISTEMA DE JEFES ---
    function spawnBoss() {
        boss = {
            x: canvas.width / 2,
            y: -100,
            targetY: 120,
            hp: 5000 * (gameMode === 'progressive' ? progressiveLevel : customSettings.difficulty),
            maxHp: 5000 * (gameMode === 'progressive' ? progressiveLevel : customSettings.difficulty),
            phase: 1,
            lastShot: 0
        };
        document.getElementById('boss-ui').style.display = 'block';
    }

    function updateBoss() {
        if(!boss) return;

        // Movimiento inicial
        if(boss.y < boss.targetY) boss.y += 2;

        // Patrón Touhou (Circular)
        if(Date.now() - boss.lastShot > (500 / (gameMode === 'progressive' ? progressiveLevel : customSettings.difficulty))) {
            const total = 12 + progressiveLevel * 2;
            for(let i=0; i<total; i++) {
                const angle = (frameCount / 20) + (i * (Math.PI * 2 / total));
                enemyBullets.push({
                    x: boss.x, y: boss.y,
                    vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4,
                    color: '#ff3366'
                });
            }
            boss.lastShot = Date.now();
        }

        // Colisión con balas jugador
        bullets.forEach((b, i) => {
            if(Math.hypot(b.x - boss.x, b.y - boss.y) < 50) {
                boss.hp -= (b.special ? 50 : 20);
                bullets.splice(i, 1);
                score += 10;
                document.getElementById('boss-hp-fill').style.width = `${(boss.hp/boss.maxHp)*100}%`;
            }
        });

        if(boss.hp <= 0) {
            createExplosion(boss.x, boss.y, '#fff', 50);
            boss = null;
            document.getElementById('boss-ui').style.display = 'none';
            score += 5000;
            if(gameMode === 'progressive') {
                progressiveLevel++;
                document.getElementById('level-tag').innerText = `MODO: PROG LVL ${progressiveLevel}`;
            }
        }
    }

    // --- INPUTS ---
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });
    canvas.addEventListener('mousedown', e => {
        if(gameState !== 'PLAYING') return;
        if(e.button === 0) mouse.down = true;
        if(e.button === 2) spawnSpecialBullet();
    });
    canvas.addEventListener('mouseup', () => mouse.down = false);
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function spawnBullet() {
        const angle = Math.atan2(mouse.y - nave.y, mouse.x - nave.x);
        bullets.push({ x: nave.x, y: nave.y, vx: Math.cos(angle)*12, vy: Math.sin(angle)*12, color: '#00d4ff' });
    }

    function spawnSpecialBullet() {
        const baseAngle = Math.atan2(mouse.y - nave.y, mouse.x - nave.x);
        for(let i=-1; i<=1; i++) {
            const a = baseAngle + (i * 0.2);
            bullets.push({ x: nave.x, y: nave.y, vx: Math.cos(a)*10, vy: Math.sin(a)*10, color: '#ffcc00', special: true });
        }
        screenShake = 5;
    }

    function createExplosion(x, y, color, count = 15) {
        for(let i=0; i<count; i++) {
            particles.push({
                x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, 
                life: 1.0, color: color || '#ff5500'
            });
        }
    }

    function updateHUD() {
        document.getElementById('score').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
        document.getElementById('lives').innerText = "❤️".repeat(lives);
    }

    // --- LOOP PRINCIPAL ---
    function update() {
        if(gameState !== 'PLAYING') return;
        frameCount++;

        // Movimiento Nave
        if(keys['KeyW'] || keys['ArrowUp']) nave.vy -= nave.accel;
        if(keys['KeyS'] || keys['ArrowDown']) nave.vy += nave.accel;
        if(keys['KeyA'] || keys['ArrowLeft']) nave.vx -= nave.accel;
        if(keys['KeyD'] || keys['ArrowRight']) nave.vx += nave.accel;

        nave.vx *= nave.fric; nave.vy *= nave.fric;
        nave.x += nave.vx; nave.y += nave.vy;

        if(nave.x < 0) nave.x = canvas.width; else if(nave.x > canvas.width) nave.x = 0;
        if(nave.y < 0) nave.y = canvas.height; else if(nave.y > canvas.height) nave.y = 0;

        if(mouse.down && frameCount % 8 === 0) spawnBullet();

        // Spawn Enemigos
        let spawnChance = (gameMode === 'progressive') ? (0.01 + progressiveLevel * 0.005) : (customSettings.density * 0.005);
        if(Math.random() < spawnChance && !boss) {
            enemies.push({ x: Math.random()*canvas.width, y: -20, vx: (Math.random()-0.5)*2, vy: 2 + Math.random()*2 });
        }

        // Jefe cada 10,000 puntos
        if(score > 0 && score % 10000 < 50 && !boss) {
            spawnBoss();
        }

        updateBoss();

        // Balas Enemigas (Colisión con Jugador)
        enemyBullets.forEach((eb, i) => {
            eb.x += eb.vx; eb.y += eb.vy;
            if(Math.hypot(eb.x - nave.x, eb.y - nave.y) < 10 && !nave.inmune) {
                playerHit();
                enemyBullets.splice(i, 1);
            }
            if(eb.y > canvas.height || eb.y < -100 || eb.x < -100 || eb.x > canvas.width+100) enemyBullets.splice(i, 1);
        });

        // Enemigos Normales
        enemies.forEach((e, i) => {
            e.x += e.vx; e.y += e.vy;
            if(Math.hypot(e.x - nave.x, e.y - nave.y) < 25 && !nave.inmune) {
                playerHit();
                enemies.splice(i, 1);
            }
            bullets.forEach((b, bi) => {
                if(Math.hypot(e.x - b.x, e.y - b.y) < 20) {
                    createExplosion(e.x, e.y);
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    score += 100;
                    updateHUD();
                }
            });
            if(e.y > canvas.height) enemies.splice(i, 1);
        });

        // Limpiar Balas
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            if(b.y < 0) bullets.splice(i, 1);
        });

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    function playerHit() {
        lives--;
        screenShake = 15;
        nave.inmune = true;
        createExplosion(nave.x, nave.y, '#ff0000', 30);
        setTimeout(() => nave.inmune = false, 2000);
        updateHUD();
        if(lives <= 0) {
            gameState = 'MENU';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('boss-ui').style.display = 'none';
            document.getElementById('main-title').innerText = "MISIÓN FALLIDA";
            showScreen('menu-main');
        }
    }

    function draw() {
        ctx.save();
        if(screenShake > 0) {
            ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
            screenShake *= 0.9;
        }

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Estrellas
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.z})`;
            ctx.fillRect(s.x, s.y, s.size, s.size);
            s.y += s.z * 2;
            if(s.y > canvas.height) s.y = 0;
        });

        // Boss
        if(boss) {
            ctx.fillStyle = '#ff3366';
            ctx.shadowBlur = 30; ctx.shadowColor = '#ff3366';
            ctx.beginPath();
            ctx.arc(boss.x, boss.y, 40, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Enemigos y Balas
        enemies.forEach(e => {
            ctx.fillStyle = '#ff3366';
            ctx.fillRect(e.x-10, e.y-10, 20, 20);
        });

        enemyBullets.forEach(eb => {
            ctx.fillStyle = eb.color;
            ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2); ctx.fill();
        });

        bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x-2, b.y-2, 4, 10);
        });

        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 3, 3);
        });
        ctx.globalAlpha = 1;

        // Nave
        if(gameState === 'PLAYING' && (!nave.inmune || Math.floor(Date.now()/100)%2==0)) {
            const angle = Math.atan2(mouse.y - nave.y, mouse.x - nave.x);
            ctx.save();
            ctx.translate(nave.x, nave.y);
            ctx.rotate(angle);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#1e90ff';
            ctx.beginPath();
            ctx.moveTo(15, 0); ctx.lineTo(-15, -10); ctx.lineTo(-15, 10);
            ctx.closePath(); ctx.fill();
            ctx.restore();
        }

        ctx.restore();
        requestAnimationFrame(() => { update(); draw(); });
    }

    // Inicializar estrellas
    for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, z: Math.random(), size: Math.random()*2});
    
    draw();
</script>
</body>
</html>
